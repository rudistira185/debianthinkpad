- name: Configure DNS
  tags: dns

  community.routeros.api_modify:
    hostname: "{{ ansible_host }}"
    username: "{{ ansible_user }}"
    password: "{{ ansible_password }}"
    port: "{{ ansible_port }}"

    path: ip dns

    data:
      servers: "{{ dns_servers | join(',') }}"
      allow-remote-requests: "{{ dns_allow_remote_requests }}"
