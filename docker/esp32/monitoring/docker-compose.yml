services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      esp32_net:
        ipv4_address: 172.30.30.10
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana 

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      esp32_net:
        ipv4_address: 172.30.30.20
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiNjNmNjY0YmRjZDE0ODU3NWU5ZjM4OTU3NGRjYzk0YmIiLCJ0IjoiNjBjZGNhYzctNWVjNS00NmNkLTkyNDMtZTJmN2FhZmY1ZjgwIiwicyI6IlpqVmpNVGhsWm1RdE16SXpOQzAwTVdNMkxUZ3pOR0l0TnpJNVpXWTNPVGN4WkRSaSJ9
    networks:
      esp32_net:
        ipv4_address: 172.30.30.30

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    restart: unless-stopped
    networks:
      esp32_net:
        ipv4_address: 172.30.30.40
    ports:
      - "9091:9091"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    # Menggunakan mode host agar bisa mengakses hardware secara native
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
      - '--collector.hwmon'
      - '--collector.thermal_zone'     # Tambahan untuk sensor suhu sistem lainnya
      - '--collector.powersupplyclass' # Nama yang benar sesuai official repo

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    privileged: true # Dibutuhkan untuk ICMP (Ping)
    network_mode: host
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml

networks:
  esp32_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.30.0/24
    driver_opts:
      com.docker.network.bridge.name: esp32

volumes:
  prometheus_data: # Data metrik Prometheus
  grafana_data:   # Data dashboard & user Grafana